# One-command local run for the workshop image.
#
# Usage:
#   cp .env.example .env       # fill in your keys
#   docker compose up
#
# Host port 28789 → container port 18789. Picked deliberately so the workshop
# gateway doesn't collide with a host-installed `openclaw gateway` (which also
# defaults to 18789). The dashboard is at http://localhost:28789.

services:
  openclaw:
    image: ghcr.io/opencolin/openclaw-workshop:latest
    # For local edits / dev, uncomment the build line and `docker compose build`:
    # build: .
    container_name: openclaw-workshop
    restart: unless-stopped
    env_file: .env
    environment:
      # Tell the entrypoint which host-facing port to print in the dashboard URL.
      # Must match the left-hand side of the gateway port mapping below.
      OPENCLAW_HOST_PORT: "28789"
    ports:
      - "28789:18789"   # OpenClaw gateway (dashboard + WebSocket) — host:container
      - "8080:8080"     # healthcheck responder
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
