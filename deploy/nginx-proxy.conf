# Reverse proxy: inference.local -> Nebius Token Factory
# NemoClaw's sandbox expects LLM calls at https://inference.local/v1
# This proxy intercepts those calls and forwards them to Token Factory,
# injecting the API key automatically.

server {
    listen 443 ssl;
    server_name inference.local;

    ssl_certificate     /etc/nginx/ssl/inference.crt;
    ssl_certificate_key /etc/nginx/ssl/inference.key;

    location /v1/ {
        proxy_pass https://api.tokenfactory.nebius.com/v1/;
        proxy_ssl_server_name on;

        # Inject Token Factory API key
        proxy_set_header Authorization "Bearer ${TOKEN_FACTORY_API_KEY}";
        proxy_set_header Host api.tokenfactory.nebius.com;
        proxy_set_header Content-Type $content_type;

        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # Health endpoint for the proxy itself
    location /health {
        return 200 '{"status":"ok","proxy":"token-factory"}';
        add_header Content-Type application/json;
    }
}
